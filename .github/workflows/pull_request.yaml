name: pull request pipeline
permissions:
  contents: write
  packages: write

on:
  pull_request:
    types: [closed]
jobs:
  build-and-push:
    if:
      github.event.pull_request.merge == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean build -x javadoc

      - name: Create Tag
        run: | 
              git config user.name github-actions[bot]
              git config user.email github-actions[bot]@user.noreply.github.com
              TAG = ${{github.events.pull_request.title}}
              git push master $TAG
